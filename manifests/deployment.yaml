apiVersion: apps/v1
kind: Deployment
metadata:
  name: issue-fix-watcher
  namespace: issue-fix-agent
  labels:
    app: issue-fix-agent
    component: watcher
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: issue-fix-agent
      component: watcher
  template:
    metadata:
      labels:
        app: issue-fix-agent
        component: watcher
    spec:
      serviceAccountName: watcher
      terminationGracePeriodSeconds: 300
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: watcher
          image: quay.io/rzalavad/issue-fix-agent:latest
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              ln -sf /app/opencode.json /tmp/opencode.json
              ln -sf /app/AGENTS.md /tmp/AGENTS.md
              mkdir -p /tmp/.opencode
              ln -sf /app/.opencode/agents /tmp/.opencode/agents
              ln -sf /app/.opencode/skills /tmp/.opencode/skills
              ln -sf /app/.opencode/plugins /tmp/.opencode/plugins
              ln -sf /app/.opencode/settings.json /tmp/.opencode/settings.json
              ln -sf /tmp/litemaas-config/opencode.json /tmp/.opencode/opencode.json
              echo "Symlinks ready:" && ls -la /tmp/.opencode/
              cd /app && python -m orchestrator.watcher --loop
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: watcher-secrets
                  key: GITHUB_TOKEN
            - name: JIRA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: watcher-secrets
                  key: JIRA_USERNAME
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: watcher-secrets
                  key: JIRA_API_TOKEN
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: opencode-config
              mountPath: /app/.opencode/opencode.json
              subPath: opencode.json
              readOnly: true
            - name: opencode-config-tmp
              mountPath: /tmp/litemaas-config/opencode.json
              subPath: opencode.json
              readOnly: true
            - name: data
              mountPath: /app/orchestrator/state
              subPath: state
            - name: data
              mountPath: /app/orchestrator/logs
              subPath: logs
            - name: data
              mountPath: /app/runs
              subPath: runs
          livenessProbe:
            exec:
              command: ["test", "-f", "/tmp/watcher-healthy"]
            initialDelaySeconds: 60
            periodSeconds: 300
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: watcher-config
            items:
              - key: config.env
                path: config.env
              - key: projects.json
                path: projects.json
        - name: opencode-config
          secret:
            secretName: litemaas-config
        - name: opencode-config-tmp
          secret:
            secretName: litemaas-config
        - name: data
          persistentVolumeClaim:
            claimName: watcher-data
