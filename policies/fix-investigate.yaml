version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /etc
    - /bin
    - /app
    - /opt
  read_write:
    - /sandbox
    - /tmp
    - /home
    - /dev

landlock:
  compatibility: best_effort

network_policies:
  github:
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        access: full
      - host: api.github.com
        port: 443
        protocol: rest
        access: full
      - host: codeload.github.com
        port: 443
        protocol: rest
        access: read-only
    binaries:
      - path: /**

  githubusercontent:
    endpoints:
      - host: raw.githubusercontent.com
        port: 443
        protocol: rest
        access: read-only
    binaries:
      - path: /**

  jira:
    endpoints:
      - host: stage-redhat.atlassian.net
        port: 443
        protocol: rest
        access: full
    binaries:
      - path: /**

  vertex_ai:
    endpoints:
      - host: us-east5-aiplatform.googleapis.com
        port: 443
        protocol: rest
        access: full
      - host: aiplatform.googleapis.com
        port: 443
        protocol: rest
        access: full
    binaries:
      - path: /**

  litemaas:
    endpoints:
      - host: litellm-litemaas.apps.prod.rhoai.rh-aiservices-bu.com
        port: 443
        protocol: rest
        access: full
    binaries:
      - path: /**
